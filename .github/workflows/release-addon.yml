name: Build and Publish Firefox Addon

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and Publish Firefox Addon
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NUM="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "num=${NUM}" >> "$GITHUB_OUTPUT"

      - name: Set manifest version
        run: |
          jq --arg v "${{ steps.version.outputs.num }}" '.version = $v' \
            addons/firefox/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json addons/firefox/manifest.json

      - name: Build addon zip
        id: build
        uses: kewisch/action-web-ext@v1
        with:
          cmd: build
          source: addons/firefox
          filename: "jdownloader-addon-cnl-${{ steps.version.outputs.num }}.xpi"

      - name: Sign and submit to Firefox Add-ons (AMO)
        id: sign
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: ${{ steps.build.outputs.target }}
          channel: unlisted
          metaDataFile: addons/firefox/amo_metadata.json
          apiKey: ${{ secrets.AMO_SIGN_KEY }}
          apiSecret: ${{ secrets.AMO_SIGN_SECRET }}

      - name: Upload signed .xpi to GitHub Release
        run: |
          XPI="jdownloader-addon-cnl-${{ steps.version.outputs.num }}.xpi"
          mv "${{ steps.sign.outputs.target }}" "$XPI"
          gh release upload "${{ steps.version.outputs.tag }}" "$XPI" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
